    <meta charset="UTF-8">

<body>

     <h1 class="TODO">My Todo List</h1>

    <form id="addTasks">

       <input type="text" id="taskInput" placeholder="Enter new task">
    
       <button type="button" id="addBtn"> <i class="fa-solid fa-plus"></i></i></button><br> <br>

    </form>

        <!-- FETCH TASKS FROM FAKE API -->
        <button id="fetchData" style="margin-bottom: 10px; background-color: chocolate;">Fetch External Todos</button>

        <p> Total number of tasks: <span id="taskCount">0</span></p>
        <ul id="taskList">
            <h3 class="mytasks">My Tasks</h3>
            
        </ul>

        <button type="button" id="clearBtn">Clear All</button>
        <script src="new.js"></script>
    
</body>
